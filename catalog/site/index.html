<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XAIO OTA Catalog</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #132238;
      --subtle: #4f5e75;
      --line: #d5dce7;
      --accent: #0f6d62;
    }
    body {
      margin: 0;
      padding: 32px;
      background: radial-gradient(circle at top, #ffffff, var(--bg));
      color: var(--ink);
      font: 16px/1.5 "Segoe UI", sans-serif;
    }
    .card {
      max-width: 820px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(19, 34, 56, 0.08);
    }
    h1 {
      margin-top: 0;
    }
    a {
      color: var(--accent);
    }
    code {
      background: #edf2f8;
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>XAIO OTA Catalog</h1>
    <p>This GitHub Pages site publishes metadata for the Android OTA app.</p>
    <ul>
      <li><a href="./catalog.json">catalog.json</a> for the latest release per channel</li>
      <li><a href="./releases.json">releases.json</a> for full release history and release notes</li>
    </ul>
    <p>Configure the Android app with the final GitHub owner and repository values before shipping.</p>
  </main>
</body>
</html>
