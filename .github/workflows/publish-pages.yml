name: Publish OTA Metadata To GitHub Pages

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download release metadata assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p /tmp/release-assets
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "release-metadata.json" \
            --pattern "firmware.zip.sha256" \
            --dir /tmp/release-assets

      - name: Update catalog and release history
        env:
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python scripts/update_catalog.py \
            --site-dir catalog/site \
            --release-metadata /tmp/release-assets/release-metadata.json \
            --sha256-file /tmp/release-assets/firmware.zip.sha256

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: catalog/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
